<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News - Suri.AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <nav>
      <div class="nav-left">
        <a href="about.html">ABOUT US</a>
        <a href="contact.html">CONTACT US</a>
        <a href="news.html">NEWS</a>
      </div>
      <div class="nav-logo">
        <a href="index.html" class="logo-pill">SURI.AI</a>
      </div>
      <div class="nav-right">
        <a href="resources.html">COURSE</a>
        <a href="summarizer.html">SUMMARIZER</a>
        <a href="signup.html">REGISTER</a>
        <a href="login.html">SIGN IN</a>
      </div>
    </nav>
  </header>

  <main class="main-interface">
    <section class="prompt-section" style="max-width: 1200px;">
      <h1 class="main-title">Latest News</h1>
      
      <div id="news-container" class="news-grid">
        <p>Loading latest news...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Powered by Suri.AI</p>
  </footer>

  <script>
    const apiKey = process.env.NEWS_API_KEY;
    const apiUrl = `https://newsapi.org/v2/top-headlines?country=us&apiKey=${apiKey}`;

    async function fetchNews() {
      try {
        const response = await fetch(apiUrl);
        const data = await response.json();
        const container = document.getElementById('news-container');
        
        if (data.status === 'ok') {
          container.innerHTML = '';
          data.articles.slice(0, 9).forEach(article => {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
              <div class="news-img-wrapper">
                <img src="${article.urlToImage || 'https://images.unsplash.com/photo-1504711432869-efd597cdd042?auto=format&fit=crop&q=80&w=400'}" alt="News Image">
              </div>
              <div class="news-content">
                <small class="news-date">${new Date(article.publishedAt).toLocaleDateString()}</small>
                <h3><a href="${article.url}" target="_blank">${article.title}</a></h3>
                <p>${article.description || 'No description available for this article.'}</p>
              </div>
            `;
            container.appendChild(card);
          });
        } else {
          container.innerHTML = '<p>Limit reached or invalid API key.</p>';
        }
      } catch (error) {
        document.getElementById('news-container').innerHTML = '<p>Error connecting to News API.</p>';
      }
    }
    fetchNews();
  </script>
</body>
</html>
