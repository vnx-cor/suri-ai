<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>
<body class="star-bg">
  <header class="site-header">
    <nav>
      <div class="nav-left">
        <a href="about.html">ABOUT US</a>
        <a href="contact.html">CONTACT US</a>
        <a href="news.html">NEWS</a>
      </div>
      <div class="nav-logo">
        <a href="index.html" class="logo-pill">SURI.AI</a>
      </div>
      <div class="nav-right">
        <a href="resources.html">COURSE</a>
        <a href="register.html">REGISTER</a>
        <a href="login.html">SIGN IN</a>
      </div>
    </nav>
  </header>

  <main class="main-interface">
    <section class="prompt-section">
      <h1 class="main-title">Need any help?</h1>
      
      <form id="summarizerForm" class="search-container">
        <div class="search-wrapper">
          <span class="search-icon-plus">+</span>
          <input type="text" id="inputText" placeholder="Paste article or search news check" required autocomplete="off">
          <div class="search-actions">
            <button type="button" class="icon-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <button type="submit" class="icon-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
          </div>
        </div>
        <div id="summaryStatus" class="search-status"></div>
      </form>

      <div id="summaryOutput" class="summary-output" style="display: none;">
        <p id="summaryText"></p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Powered by Suri.AI</p>
  </footer>
</body>
</html>
